<VirtualHost *:80>
    ServerName YOUR_DOMAIN_OR_IP

    # === Frontend (React SPA) ===
    DocumentRoot /var/www/zigzag/client/dist

    <Directory /var/www/zigzag/client/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback — serve index.html for all frontend routes
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api
        RewriteCond %{REQUEST_URI} !^/socket.io
        RewriteCond %{REQUEST_URI} !^/uploads
        RewriteRule . /index.html [L]
    </Directory>

    # === API Proxy → Node.js (port 3001) ===
    ProxyPreserveHost On

    ProxyPass /api http://127.0.0.1:3001/api
    ProxyPassReverse /api http://127.0.0.1:3001/api

    # === Uploaded Files Proxy ===
    ProxyPass /uploads http://127.0.0.1:3001/uploads
    ProxyPassReverse /uploads http://127.0.0.1:3001/uploads

    # === WebSocket Proxy (Socket.io) ===
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/socket\.io/(.*) ws://127.0.0.1:3001/socket.io/$1 [P,L]

    ProxyPass /socket.io http://127.0.0.1:3001/socket.io
    ProxyPassReverse /socket.io http://127.0.0.1:3001/socket.io

    # === Security Headers ===
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    # Hide server info
    ServerSignature Off

    # File upload size limit
    LimitRequestBody 5242880

    # === Logging ===
    ErrorLog ${APACHE_LOG_DIR}/zigzag-error.log
    CustomLog ${APACHE_LOG_DIR}/zigzag-access.log combined
</VirtualHost>
